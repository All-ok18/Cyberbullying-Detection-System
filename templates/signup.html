<!DOCTYPE html>

<html>

<head>

<link
rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<nav>

<div class="logo">CyberDetect</div>

<ul>

<li><a href="/">Home</a></li>

<li><a href="/login">Login</a></li>

<li><a href="/signup">Signup</a></li>

<li><a href="/about">About Us</a></li>

<li><a href="/admin">Admin Login</a></li>

</ul>

</nav>

<div class="container">

<h1>Sign Up</h1>

<form method="POST">

<div class="input-box">

<input

type="text"

name="name"

placeholder="Full Name"

required>

</div>

<div class="input-box">

<input

type="email"

name="email"

placeholder="Email Address"

required>

</div>

<div class="input-box">

<input

type="password"

name="password"

placeholder="Password"

required>

</div>

<div class="input-box">

<input

type="password"

name="confirm_password"

placeholder="Confirm Password"

required>

</div>

<button type="submit">Create Account</button>

</form>

<div class="link">

Already have an account?

<a href="/login">Login</a>

</div>

</div>

</body>

</html>
